name: Release Check

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  goreleaser-snapshot:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [darwin, linux, windows]
    env:
      GOOS: ${{ matrix.goos }}
      GORELEASER_CURRENT_TAG: v0.0.0-snapshot
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: v2.14.3
          args: release --snapshot --clean --skip=changelog --split
