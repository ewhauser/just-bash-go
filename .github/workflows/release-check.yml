name: Release Check

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  cross-compile:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [darwin, linux, windows]
        goarch: [amd64, arm64]
    env:
      CGO_ENABLED: "0"
      GOOS: ${{ matrix.goos }}
      GOARCH: ${{ matrix.goarch }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version-file: go.mod

      - run: go build -trimpath ./cmd/gbash
      - run: go build -trimpath ./contrib/extras/cmd/gbash-extras

  gbash-wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version-file: go.mod

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
        with:
          run_install: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          cache: pnpm
          node-version: "20"

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build @ewhauser/gbash-wasm
        run: pnpm --filter @ewhauser/gbash-wasm build

  website-export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version-file: go.mod

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
        with:
          run_install: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          cache: pnpm
          node-version: "20"

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build website export
        env:
          GBASH_WEBSITE_BASE_PATH: /gbash
          NEXT_PUBLIC_SITE_URL: https://ewhauser.github.io/gbash
        run: ./scripts/export_website_pages.sh "$PWD" "${RUNNER_TEMP}/github-pages"
