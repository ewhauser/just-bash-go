name: Publish Release

on:
  pull_request_target:
    types:
      - closed
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: Release version in vX.Y.Z form
        required: true
        type: string
      ref:
        description: Commit SHA or ref to publish from
        required: false
        default: main
        type: string

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: publish-release-${{ github.event_name == 'workflow_dispatch' && inputs.version || github.event.pull_request.head.ref }}
  cancel-in-progress: false

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      should_publish: ${{ steps.context.outputs.should_publish }}
      version: ${{ steps.context.outputs.version }}
      ref: ${{ steps.context.outputs.ref }}
    steps:
      - id: context
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_REF: ${{ inputs.ref }}
          REPOSITORY: ${{ github.repository }}
          PR_MERGED: ${{ github.event.pull_request.merged }}
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          PR_LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
        run: |
          set -euo pipefail
          should_publish=false
          version=""
          ref=""

          if [[ "${EVENT_NAME}" == "workflow_dispatch" ]]; then
            should_publish=true
            version="${INPUT_VERSION}"
            ref="${INPUT_REF:-main}"
          elif [[ "${PR_MERGED}" == "true" ]] \
            && [[ "${PR_BASE_REF}" == "main" ]] \
            && [[ "${PR_HEAD_REPO}" == "${REPOSITORY}" ]] \
            && [[ "${PR_HEAD_REF}" == release/v* ]] \
            && [[ ",${PR_LABELS}," == *",release,"* ]] \
            && [[ "${PR_AUTHOR}" == "github-actions[bot]" ]] \
            && [[ -n "${PR_MERGE_SHA}" ]]; then
            should_publish=true
            version="${PR_HEAD_REF#release/}"
            ref="${PR_MERGE_SHA}"
          fi

          if [[ "${should_publish}" == "true" ]] && [[ ! "${version}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "invalid release version: ${version}" >&2
            exit 1
          fi

          {
            echo "should_publish=${should_publish}"
            echo "version=${version}"
            echo "ref=${ref}"
          } >> "${GITHUB_OUTPUT}"

  publish:
    needs: resolve
    if: needs.resolve.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    outputs:
      pages_deployable: ${{ steps.pages_state.outputs.deployable }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          ref: ${{ needs.resolve.outputs.ref }}

      - name: Fetch tags
        run: git fetch --force --tags origin

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version-file: go.mod

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
        with:
          run_install: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          cache: pnpm
          node-version: "20"

      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5
        id: pages

      - name: Verify release tree
        env:
          VERSION: ${{ needs.resolve.outputs.version }}
        run: |
          set -euo pipefail
          make fix-modules MODULE_VERSION="${VERSION}"
          if ! git diff --quiet --exit-code; then
            echo "release commit is not synchronized for ${VERSION}" >&2
            git status --short
            git diff --stat
            exit 1
          fi

      - run: make build

      - run: make test

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Detect previous root tag
        id: previous
        env:
          VERSION: ${{ needs.resolve.outputs.version }}
        run: |
          set -euo pipefail
          previous="$(git tag --list 'v*' --sort=-version:refname | grep -Fxv "${VERSION}" | head -n 1 || true)"
          echo "tag=${previous}" >> "${GITHUB_OUTPUT}"

      - name: Create and push coordinated tags
        env:
          ALLOW_NON_MAIN: "1"
          PUSH: "1"
          REMOTE: origin
          RELEASE_VERSION: ${{ needs.resolve.outputs.version }}
        run: ./scripts/tag_release.sh

      - name: Check out root release tag
        env:
          VERSION: ${{ needs.resolve.outputs.version }}
        run: git checkout --force "${VERSION}"

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Preserve published compatibility assets
        id: compat_assets
        env:
          COMPAT_URL: https://${{ github.repository_owner }}.github.io${{ steps.pages.outputs.base_path }}/compat/latest
          COMPAT_DIR: ${{ runner.temp }}/compat-assets
        run: |
          set -euo pipefail
          rm -rf "$COMPAT_DIR"
          mkdir -p "$COMPAT_DIR"

          if curl --fail --location --silent --show-error --output "$COMPAT_DIR/summary.json" "$COMPAT_URL/summary.json" \
            && curl --fail --location --silent --show-error --output "$COMPAT_DIR/badge.svg" "$COMPAT_URL/badge.svg"; then
            echo "available=true" >> "$GITHUB_OUTPUT"
            echo "summary_path=$COMPAT_DIR/summary.json" >> "$GITHUB_OUTPUT"
            echo "badge_path=$COMPAT_DIR/badge.svg" >> "$GITHUB_OUTPUT"
          else
            rm -rf "$COMPAT_DIR"
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build website Pages bundle
        id: website_build
        if: steps.compat_assets.outputs.available == 'true'
        env:
          GBASH_WEBSITE_BASE_PATH: ${{ steps.pages.outputs.base_path }}
          NEXT_PUBLIC_SITE_URL: https://${{ github.repository_owner }}.github.io${{ steps.pages.outputs.base_path }}
          PAGES_ROOT: ${{ runner.temp }}/github-pages
          GBASH_WEBSITE_COMPAT_SUMMARY_PATH: ${{ steps.compat_assets.outputs.summary_path }}
          GBASH_WEBSITE_COMPAT_BADGE_PATH: ${{ steps.compat_assets.outputs.badge_path }}
        run: |
          set -euo pipefail
          ./scripts/export_website_pages.sh "$PWD" "$PAGES_ROOT"

      - name: Determine Pages publish state
        id: pages_state
        if: always()
        env:
          COMPAT_AVAILABLE: ${{ steps.compat_assets.outputs.available }}
          WEBSITE_BUILD_OUTCOME: ${{ steps.website_build.outcome }}
          PAGES_ROOT: ${{ runner.temp }}/github-pages
        run: |
          set -euo pipefail
          if [ "$COMPAT_AVAILABLE" = "true" ] \
            && [ "${WEBSITE_BUILD_OUTCOME:-}" = "success" ] \
            && [ -f "$PAGES_ROOT/docs/performance/compatibility/index.html" ] \
            && [ -f "$PAGES_ROOT/compat/latest/summary.json" ] \
            && [ -f "$PAGES_ROOT/compat/latest/badge.svg" ] \
            && [ ! -e "$PAGES_ROOT/compat/latest/index.html" ]; then
            echo "deployable=true" >> "$GITHUB_OUTPUT"
          else
            echo "deployable=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload Pages artifact
        if: steps.pages_state.outputs.deployable == 'true'
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4
        with:
          path: ${{ runner.temp }}/github-pages

      - name: Detect existing GitHub release
        id: github_release
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        env:
          VERSION: ${{ needs.resolve.outputs.version }}
        with:
          script: |
            try {
              await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag: process.env.VERSION,
              });
              core.setOutput("exists", "true");
            } catch (error) {
              if (error.status === 404) {
                core.setOutput("exists", "false");
                return;
              }
              throw error;
            }

      - uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 # v7
        if: steps.github_release.outputs.exists != 'true'
        with:
          version: v2.14.3
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ needs.resolve.outputs.version }}
          GORELEASER_PREVIOUS_TAG: ${{ steps.previous.outputs.tag }}

      - name: Skip Goreleaser when release already exists
        if: steps.github_release.outputs.exists == 'true'
        env:
          VERSION: ${{ needs.resolve.outputs.version }}
        run: echo "GitHub release already exists for ${VERSION}; skipping goreleaser."

      - name: Publish Go module docs to pkg.go.dev
        env:
          RELEASE_VERSION: ${{ needs.resolve.outputs.version }}
        run: ./scripts/publish_pkgsite.sh

      # npm publish for @ewhauser/gbash-wasm is intentionally disabled for now.
      # Keep the package build in release-check and prepare-release so the package
      # stays releasable, but do not publish from the coordinated release workflow
      # until the npm distribution contract is finalized.
      #
      # - name: Detect existing npm package version
      #   id: npm_package
      #   env:
      #     VERSION: ${{ needs.resolve.outputs.version }}
      #   run: |
      #     set -euo pipefail
      #     package_version="${VERSION#v}"
      #     if npm view "@ewhauser/gbash-wasm@${package_version}" version >/dev/null 2>&1; then
      #       echo "exists=true" >> "${GITHUB_OUTPUT}"
      #     else
      #       echo "exists=false" >> "${GITHUB_OUTPUT}"
      #     fi
      #
      # - name: Publish @ewhauser/gbash-wasm
      #   if: secrets.NPM_TOKEN != '' && steps.npm_package.outputs.exists != 'true'
      #   env:
      #     NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      #   run: |
      #     set -euo pipefail
      #     pnpm --filter @ewhauser/gbash-wasm build
      #     cd packages/gbash-wasm
      #     npm publish --access public
      #
      # - name: Skip npm publish when token is missing
      #   if: secrets.NPM_TOKEN == ''
      #   run: echo "NPM_TOKEN is not configured; skipping npm publish."
      #
      # - name: Skip npm publish when version already exists
      #   if: secrets.NPM_TOKEN != '' && steps.npm_package.outputs.exists == 'true'
      #   env:
      #     VERSION: ${{ needs.resolve.outputs.version }}
      #   run: echo "@ewhauser/gbash-wasm ${VERSION#v} is already published; skipping npm publish."

  publish_pages:
    needs:
      - resolve
      - publish
    if: needs.resolve.outputs.should_publish == 'true' && needs.publish.outputs.pages_deployable == 'true'
    runs-on: ubuntu-latest
    concurrency:
      group: github-pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
