name: Fuzz Full

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fuzz-full:
    name: Fuzz Full (${{ matrix.shard }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - shard: shard-1
            make_var: FUZZ_FULL_SHARD_1
          - shard: shard-2
            make_var: FUZZ_FULL_SHARD_2
          - shard: shard-3
            make_var: FUZZ_FULL_SHARD_3
          - shard: shard-4
            make_var: FUZZ_FULL_SHARD_4
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version-file: go.mod

      - run: make fuzz-shard
        env:
          FUZZ_SHARD: ${{ matrix.make_var }}
          FUZZTIME: 10s

      - name: Upload fuzz corpus artifacts
        if: failure()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: fuzz-full-${{ matrix.shard }}-corpus
          if-no-files-found: ignore
          path: |
            **/testdata/fuzz/Fuzz*/*
