name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  detect-fuzz-changes:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      run_core_deep: ${{ steps.detect.outputs.run_core_deep }}
      run_jq_deep: ${{ steps.detect.outputs.run_jq_deep }}
      run_yq_deep: ${{ steps.detect.outputs.run_yq_deep }}
      run_sqlite3_deep: ${{ steps.detect.outputs.run_sqlite3_deep }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version-file: go.mod

      - id: detect
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail
          run_core_deep=false
          run_jq_deep=false
          run_yq_deep=false
          run_sqlite3_deep=false

          repo_core_deep_dirs=()
          while IFS= read -r dir; do
            case "$dir" in
              "$GITHUB_WORKSPACE"/*)
                repo_core_deep_dirs+=("${dir#"$GITHUB_WORKSPACE"/}")
                ;;
            esac
          done < <(
            go list -deps -test -f '{{if and .Dir (not .Standard)}}{{.Dir}}{{end}}' ./internal/runtime ./fs ./policy ./network \
              | sort -u
          )
          repo_core_deep_dirs+=("third_party/mvdan-sh/patches")

          while IFS= read -r file; do
            case "$file" in
              Makefile|go.mod|go.sum|go.work|go.work.sum|.github/workflows/ci.yml|.github/workflows/fuzz-full.yml)
                run_core_deep=true
                ;;
            esac
            if [ "$run_core_deep" = false ]; then
              for dir in "${repo_core_deep_dirs[@]}"; do
                case "$file" in
                  "$dir"|"$dir"/*)
                    run_core_deep=true
                    break
                    ;;
                esac
              done
            fi
            case "$file" in
              contrib/jq/*)
                run_jq_deep=true
                ;;
              contrib/yq/*)
                run_yq_deep=true
                ;;
              contrib/sqlite3/*)
                run_sqlite3_deep=true
                ;;
            esac
          done < <(git diff --name-only "$BASE_SHA"...HEAD)

          {
            echo "run_core_deep=$run_core_deep"
            echo "run_jq_deep=$run_jq_deep"
            echo "run_yq_deep=$run_yq_deep"
            echo "run_sqlite3_deep=$run_sqlite3_deep"
          } >> "$GITHUB_OUTPUT"

  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version-file: go.mod

      - run: make build

      - run: make test

  fuzz-pr-core-deep:
    if: github.event_name == 'pull_request' && needs.detect-fuzz-changes.outputs.run_core_deep == 'true'
    needs: detect-fuzz-changes
    name: Fuzz PR Deep (${{ matrix.shard }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - shard: shard-1
            make_var: FUZZ_FULL_SHARD_1
            fuzztime: 15s
          - shard: shard-2
            make_var: FUZZ_FULL_SHARD_2
            fuzztime: 20s
          - shard: shard-3
            make_var: FUZZ_FULL_SHARD_3
            fuzztime: 15s
          - shard: shard-4
            make_var: FUZZ_FULL_SHARD_4
            fuzztime: 15s
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version-file: go.mod

      - run: make fuzz-shard
        env:
          FUZZ_SHARD: ${{ matrix.make_var }}
          FUZZTIME: ${{ matrix.fuzztime }}

      - name: Upload fuzz corpus artifacts
        if: failure()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: fuzz-pr-deep-${{ matrix.shard }}-corpus
          if-no-files-found: ignore
          path: |
            **/testdata/fuzz/Fuzz*/*

  fuzz-pr-jq-deep:
    if: github.event_name == 'pull_request' && needs.detect-fuzz-changes.outputs.run_jq_deep == 'true'
    needs: detect-fuzz-changes
    name: Fuzz PR Deep (jq)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version-file: go.mod

      - run: make fuzz-run
        env:
          FUZZ_TARGETS: ./contrib/jq:FuzzJQCompatibilityFlags ./contrib/jq:FuzzJQCommands
          FUZZTIME: 15s

      - name: Upload fuzz corpus artifacts
        if: failure()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: fuzz-pr-jq-corpus
          if-no-files-found: ignore
          path: |
            **/testdata/fuzz/Fuzz*/*

  fuzz-pr-yq-deep:
    if: github.event_name == 'pull_request' && needs.detect-fuzz-changes.outputs.run_yq_deep == 'true'
    needs: detect-fuzz-changes
    name: Fuzz PR Deep (yq)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version-file: go.mod

      - run: make fuzz-run
        env:
          FUZZ_TARGETS: ./contrib/yq:FuzzYQCommands
          FUZZTIME: 15s

      - name: Upload fuzz corpus artifacts
        if: failure()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: fuzz-pr-yq-corpus
          if-no-files-found: ignore
          path: |
            **/testdata/fuzz/Fuzz*/*

  fuzz-pr-sqlite3-deep:
    if: github.event_name == 'pull_request' && needs.detect-fuzz-changes.outputs.run_sqlite3_deep == 'true'
    needs: detect-fuzz-changes
    name: Fuzz PR Deep (sqlite3)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version-file: go.mod

      - run: make fuzz-run
        env:
          FUZZ_TARGETS: ./contrib/sqlite3:FuzzSQLiteCommands ./contrib/sqlite3:FuzzSQLiteFileCommands
          FUZZTIME: 15s

      - name: Upload fuzz corpus artifacts
        if: failure()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: fuzz-pr-sqlite3-corpus
          if-no-files-found: ignore
          path: |
            **/testdata/fuzz/Fuzz*/*
