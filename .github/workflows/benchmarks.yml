name: Benchmarks

on:
  pull_request:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: benchmarks-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  BENCHSTAT_VERSION: v0.0.0-20260211190930-8161c38c6cdc
  BENCH_SMOKE_COUNT: "8"
  BENCH_SMOKE_TIME: "100ms"
  BENCH_SMOKE_REGEX: "Benchmark(NewSession|RuntimeRunSimpleScript|SessionExecWarmSimpleScript|WorkflowCodebaseExploration|CommandRGRecursive|CommandJQTransform)$"

jobs:
  pr-smoke:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install benchstat
        run: |
          go install golang.org/x/perf/cmd/benchstat@${BENCHSTAT_VERSION}
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Compare smoke benchmarks
        env:
          ARTIFACT_DIR: ${{ runner.temp }}/bench-results
          BASE_DIR: ${{ runner.temp }}/bench-base
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail

          rm -rf "$ARTIFACT_DIR" "$BASE_DIR"
          mkdir -p "$ARTIFACT_DIR"

          git worktree add "$BASE_DIR" "$BASE_SHA"

          cp runtime/bench_helpers_test.go "$BASE_DIR/runtime/"
          cp runtime/benchmarks_test.go "$BASE_DIR/runtime/"
          cp runtime/test_helpers_test.go "$BASE_DIR/runtime/"
          cp runtime/fixture_helpers_test.go "$BASE_DIR/runtime/"

          (
            cd "$BASE_DIR"
            go test ./runtime -run=^$ -bench "$BENCH_SMOKE_REGEX" -benchmem -count="$BENCH_SMOKE_COUNT" -benchtime="$BENCH_SMOKE_TIME" > "$ARTIFACT_DIR/base.txt"
          )
          go test ./runtime -run=^$ -bench "$BENCH_SMOKE_REGEX" -benchmem -count="$BENCH_SMOKE_COUNT" -benchtime="$BENCH_SMOKE_TIME" > "$ARTIFACT_DIR/head.txt"
          benchstat "$ARTIFACT_DIR/base.txt" "$ARTIFACT_DIR/head.txt" | tee "$ARTIFACT_DIR/benchstat.txt"

          {
            echo "## Benchmark Smoke"
            echo
            echo "Comparing PR head against base commit \`$BASE_SHA\`."
            echo
            echo '```text'
            cat "$ARTIFACT_DIR/benchstat.txt"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload smoke benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bench-smoke-${{ github.event.pull_request.number }}
          path: ${{ runner.temp }}/bench-results
          retention-days: 14

      - name: Remove base worktree
        if: always()
        env:
          BASE_DIR: ${{ runner.temp }}/bench-base
        run: |
          set -euo pipefail
          if git worktree list --porcelain | grep -F "worktree $BASE_DIR" >/dev/null; then
            git worktree remove --force "$BASE_DIR"
          fi

  full-suite:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run full benchmark suite
        env:
          ARTIFACT_DIR: ${{ runner.temp }}/bench-results
        run: |
          set -euo pipefail

          rm -rf "$ARTIFACT_DIR"
          mkdir -p "$ARTIFACT_DIR"

          make bench-full > "$ARTIFACT_DIR/full.txt"

          {
            echo "## Full Benchmark Suite"
            echo
            echo "Commit \`${GITHUB_SHA}\`."
            echo
            echo '```text'
            cat "$ARTIFACT_DIR/full.txt"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload full benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bench-full-${{ github.sha }}
          path: ${{ runner.temp }}/bench-results
          retention-days: 14
