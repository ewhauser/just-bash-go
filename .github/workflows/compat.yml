name: Compat

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

permissions:
  contents: read
  packages: read
  pages: write
  id-token: write

concurrency:
  group: compat-pages
  cancel-in-progress: true

jobs:
  compat:
    runs-on: ubuntu-24.04
    outputs:
      exit_code: ${{ steps.run-compat.outputs.exit_code }}
      publishable: ${{ steps.publish-state.outputs.publishable }}
      deployable: ${{ steps.publish-state.outputs.deployable }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"

      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5
        id: pages

      - name: Detect latest release tag for website
        id: website_tag
        run: |
          set -euo pipefail
          tag="$(git tag --list 'v*' --sort=-version:refname | head -n 1 || true)"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Build released website bundle
        id: website_build
        if: steps.website_tag.outputs.tag != ''
        continue-on-error: true
        env:
          RELEASE_TAG: ${{ steps.website_tag.outputs.tag }}
          RELEASED_SOURCE: ${{ runner.temp }}/released-website-source
          PAGES_ROOT: ${{ runner.temp }}/compat-pages
          GBASH_WEBSITE_BASE_PATH: ${{ steps.pages.outputs.base_path }}
          NEXT_PUBLIC_SITE_URL: https://${{ github.repository_owner }}.github.io${{ steps.pages.outputs.base_path }}
        shell: bash
        run: |
          set -euo pipefail
          rm -rf "$RELEASED_SOURCE"
          git worktree add --detach "$RELEASED_SOURCE" "$RELEASE_TAG"
          cleanup() {
            git worktree remove --force "$RELEASED_SOURCE" || true
          }
          trap cleanup EXIT

          (
            cd "$RELEASED_SOURCE"
            npm exec --yes pnpm@10.10.0 -- install --frozen-lockfile
          )

          ./scripts/export_website_pages.sh "$RELEASED_SOURCE" "$PAGES_ROOT"

      - name: Run GNU compatibility harness
        id: run-compat
        env:
          RESULTS_DIR: .cache/gnu/results/ci-latest
        run: |
          set +e
          rm -rf "$RESULTS_DIR"
          mkdir -p "$RESULTS_DIR"
          GNU_RESULTS_DIR="$RESULTS_DIR" make gnu-test
          rc=$?
          echo "exit_code=$rc" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Render compat report assets
        if: always()
        env:
          RESULTS_DIR: .cache/gnu/results/ci-latest
        run: |
          set +e
          if [ -f "$RESULTS_DIR/summary.json" ]; then
            go run ./scripts/compat-report --summary "$RESULTS_DIR/summary.json" --output "$RESULTS_DIR"
          fi
          exit 0

      - name: Determine publishable compat bundle
        id: publish-state
        if: always()
        env:
          RESULTS_DIR: .cache/gnu/results/ci-latest
          PAGES_ROOT: ${{ runner.temp }}/compat-pages
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          REF_NAME: ${{ github.ref_name }}
          WEBSITE_TAG: ${{ steps.website_tag.outputs.tag }}
          WEBSITE_BUILD_OUTCOME: ${{ steps.website_build.outcome }}
        shell: bash
        run: |
          set -euo pipefail
          bundle_dir="$PAGES_ROOT/compat/latest"

          if [ "${WEBSITE_BUILD_OUTCOME:-}" != "success" ]; then
            rm -rf "$PAGES_ROOT"
            mkdir -p "$PAGES_ROOT"
          fi

          rm -rf "$bundle_dir"
          mkdir -p "$bundle_dir"

          if [ -f "$RESULTS_DIR/summary.json" ] && { [ ! -f "$RESULTS_DIR/index.html" ] || [ ! -f "$RESULTS_DIR/badge.svg" ]; }; then
            set +e
            go run ./scripts/compat-report --summary "$RESULTS_DIR/summary.json" --output "$RESULTS_DIR"
            set -e
          fi

          if [ -f "$RESULTS_DIR/summary.json" ] && [ -f "$RESULTS_DIR/index.html" ] && [ -f "$RESULTS_DIR/badge.svg" ]; then
            cp -a "$RESULTS_DIR"/. "$bundle_dir"/
            echo "publishable=true" >> "$GITHUB_OUTPUT"
          else
            rm -rf "$bundle_dir"
            echo "publishable=false" >> "$GITHUB_OUTPUT"
          fi

          if [ -f "$bundle_dir/summary.json" ] && [ -f "$bundle_dir/index.html" ] && [ -f "$bundle_dir/badge.svg" ] && [ "$REF_NAME" = "$DEFAULT_BRANCH" ]; then
            if [ "${WEBSITE_BUILD_OUTCOME:-}" != "success" ]; then
              cat > "$PAGES_ROOT/index.html" <<'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta http-equiv="refresh" content="0; url=./compat/latest/">
            <title>gbash compatibility</title>
          </head>
          <body>
            <p>Redirecting to <a href="./compat/latest/">the latest compatibility report</a>.</p>
          </body>
          </html>
          EOF
            fi
            touch "$PAGES_ROOT/.nojekyll"
            echo "deployable=true" >> "$GITHUB_OUTPUT"
          else
            echo "deployable=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Summarize compat run
        if: always()
        env:
          PAGE_URL: https://ewhauser.github.io/gbash/compat/latest/
          COMPAT_EXIT_CODE: ${{ steps.run-compat.outputs.exit_code }}
          PUBLISHABLE: ${{ steps.publish-state.outputs.publishable }}
          DEPLOYABLE: ${{ steps.publish-state.outputs.deployable }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          REF_NAME: ${{ github.ref_name }}
          WEBSITE_TAG: ${{ steps.website_tag.outputs.tag }}
          WEBSITE_BUILD_OUTCOME: ${{ steps.website_build.outcome }}
        run: |
          {
            echo "## Compatibility"
            echo
            echo "Harness exit code: \`$COMPAT_EXIT_CODE\`"
            echo
            if [ -n "$WEBSITE_TAG" ] && [ "$WEBSITE_BUILD_OUTCOME" = "success" ]; then
              echo "Website bundle source: released tag \`$WEBSITE_TAG\`"
              echo
            elif [ -n "$WEBSITE_TAG" ]; then
              echo "Website bundle source: failed to build released tag \`$WEBSITE_TAG\`; using compat-only fallback."
              echo
            else
              echo "Website bundle source: no release tag found; using compat-only fallback."
              echo
            fi
            if [ "$DEPLOYABLE" = "true" ]; then
              echo "Published latest report: $PAGE_URL"
            elif [ "$PUBLISHABLE" = "true" ]; then
              echo "Report bundle generated, but not deployed because ref \`$REF_NAME\` is not the default branch \`$DEFAULT_BRANCH\`."
            else
              echo "No new report published. The previous report remains in place at $PAGE_URL"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload raw compat artifacts
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: compat-results-${{ github.run_id }}
          path: .cache/gnu/results/ci-latest
          retention-days: 30

      - name: Upload Pages artifact
        if: always() && steps.publish-state.outputs.deployable == 'true'
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4
        with:
          path: ${{ runner.temp }}/compat-pages

  publish:
    if: always() && needs.compat.outputs.deployable == 'true'
    needs: compat
    runs-on: ubuntu-24.04
    concurrency:
      group: github-pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
