name: Compat

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

permissions:
  contents: read
  packages: read
  pages: write
  id-token: write

concurrency:
  group: compat-pages
  cancel-in-progress: true

jobs:
  compat:
    runs-on: ubuntu-24.04
    outputs:
      exit_code: ${{ steps.run-compat.outputs.exit_code }}
      publishable: ${{ steps.publish-state.outputs.publishable }}
      deployable: ${{ steps.publish-state.outputs.deployable }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version-file: go.mod

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
        with:
          run_install: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          cache: pnpm
          node-version: "20"

      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5
        id: pages

      - name: Detect latest release tag for website
        id: website_tag
        run: |
          set -euo pipefail
          tag="$(git tag --list 'v*' --sort=-version:refname | head -n 1 || true)"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Run GNU compatibility harness
        id: run-compat
        env:
          RESULTS_DIR: .cache/gnu/results/ci-latest
        run: |
          set +e
          rm -rf "$RESULTS_DIR"
          mkdir -p "$RESULTS_DIR"
          GNU_RESULTS_DIR="$RESULTS_DIR" make gnu-test
          rc=$?
          echo "exit_code=$rc" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Render compat report assets
        if: always()
        env:
          RESULTS_DIR: .cache/gnu/results/ci-latest
        run: |
          set +e
          if [ -f "$RESULTS_DIR/summary.json" ]; then
            go run ./scripts/compat-report --summary "$RESULTS_DIR/summary.json" --output "$RESULTS_DIR"
          fi
          exit 0

      - name: Build released website bundle
        id: website_build
        if: always() && steps.website_tag.outputs.tag != ''
        continue-on-error: true
        env:
          RELEASE_TAG: ${{ steps.website_tag.outputs.tag }}
          RELEASED_SOURCE: ${{ runner.temp }}/released-website-source
          PAGES_ROOT: ${{ runner.temp }}/compat-pages
          RESULTS_DIR: .cache/gnu/results/ci-latest
          GBASH_WEBSITE_BASE_PATH: ${{ steps.pages.outputs.base_path }}
          NEXT_PUBLIC_SITE_URL: https://${{ github.repository_owner }}.github.io${{ steps.pages.outputs.base_path }}
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f "$RESULTS_DIR/summary.json" ] || [ ! -f "$RESULTS_DIR/badge.svg" ]; then
            echo "compatibility assets unavailable; skipping website export"
            exit 1
          fi

          summary_path="$PWD/$RESULTS_DIR/summary.json"
          badge_path="$PWD/$RESULTS_DIR/badge.svg"

          rm -rf "$RELEASED_SOURCE"
          git worktree add --detach "$RELEASED_SOURCE" "$RELEASE_TAG"
          cleanup() {
            git worktree remove --force "$RELEASED_SOURCE" || true
          }
          trap cleanup EXIT

          (
            cd "$RELEASED_SOURCE"
            pnpm install --frozen-lockfile
          )

          GBASH_WEBSITE_COMPAT_SUMMARY_PATH="$summary_path" \
          GBASH_WEBSITE_COMPAT_BADGE_PATH="$badge_path" \
          ./scripts/export_website_pages.sh "$RELEASED_SOURCE" "$PAGES_ROOT"

      - name: Check released website bundle
        id: released_bundle
        if: always()
        env:
          PAGES_ROOT: ${{ runner.temp }}/compat-pages
        shell: bash
        run: |
          set -euo pipefail
          if [ -f "$PAGES_ROOT/docs/performance/compatibility/index.html" ] \
            && [ -f "$PAGES_ROOT/compat/latest/summary.json" ] \
            && [ -f "$PAGES_ROOT/compat/latest/badge.svg" ] \
            && [ ! -e "$PAGES_ROOT/compat/latest/index.html" ]; then
            echo "usable=true" >> "$GITHUB_OUTPUT"
          else
            echo "usable=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build current checkout website bundle fallback
        id: website_build_fallback
        if: always() && steps.released_bundle.outputs.usable != 'true'
        continue-on-error: true
        env:
          PAGES_ROOT: ${{ runner.temp }}/compat-pages
          RESULTS_DIR: .cache/gnu/results/ci-latest
          GBASH_WEBSITE_BASE_PATH: ${{ steps.pages.outputs.base_path }}
          NEXT_PUBLIC_SITE_URL: https://${{ github.repository_owner }}.github.io${{ steps.pages.outputs.base_path }}
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f "$RESULTS_DIR/summary.json" ] || [ ! -f "$RESULTS_DIR/badge.svg" ]; then
            echo "compatibility assets unavailable; skipping fallback website export"
            exit 1
          fi

          summary_path="$PWD/$RESULTS_DIR/summary.json"
          badge_path="$PWD/$RESULTS_DIR/badge.svg"

          pnpm install --frozen-lockfile
          GBASH_WEBSITE_COMPAT_SUMMARY_PATH="$summary_path" \
          GBASH_WEBSITE_COMPAT_BADGE_PATH="$badge_path" \
          ./scripts/export_website_pages.sh "$PWD" "$PAGES_ROOT"

      - name: Determine publishable compat bundle
        id: publish-state
        if: always()
        env:
          RESULTS_DIR: .cache/gnu/results/ci-latest
          PAGES_ROOT: ${{ runner.temp }}/compat-pages
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          REF_NAME: ${{ github.ref_name }}
          WEBSITE_TAG: ${{ steps.website_tag.outputs.tag }}
          WEBSITE_BUILD_OUTCOME: ${{ steps.website_build.outcome }}
          RELEASED_BUNDLE_USABLE: ${{ steps.released_bundle.outputs.usable }}
          FALLBACK_BUILD_OUTCOME: ${{ steps.website_build_fallback.outcome }}
        shell: bash
        run: |
          set -euo pipefail

          if [ -f "$RESULTS_DIR/summary.json" ] && [ -f "$RESULTS_DIR/badge.svg" ]; then
            echo "publishable=true" >> "$GITHUB_OUTPUT"
          else
            echo "publishable=false" >> "$GITHUB_OUTPUT"
          fi

          if [ "$RELEASED_BUNDLE_USABLE" = "true" ]; then
            echo "site_source=released tag $WEBSITE_TAG" >> "$GITHUB_OUTPUT"
          elif [ "${FALLBACK_BUILD_OUTCOME:-}" = "success" ] \
            && [ -f "$PAGES_ROOT/docs/performance/compatibility/index.html" ]; then
            echo "site_source=current checkout fallback" >> "$GITHUB_OUTPUT"
          else
            echo "site_source=unavailable" >> "$GITHUB_OUTPUT"
          fi

          if [ -f "$RESULTS_DIR/summary.json" ] \
            && [ -f "$RESULTS_DIR/badge.svg" ] \
            && [ "$REF_NAME" = "$DEFAULT_BRANCH" ] \
            && [ -f "$PAGES_ROOT/docs/performance/compatibility/index.html" ] \
            && [ -f "$PAGES_ROOT/compat/latest/summary.json" ] \
            && [ -f "$PAGES_ROOT/compat/latest/badge.svg" ] \
            && [ ! -e "$PAGES_ROOT/compat/latest/index.html" ]; then
            touch "$PAGES_ROOT/.nojekyll"
            echo "deployable=true" >> "$GITHUB_OUTPUT"
          else
            echo "deployable=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Summarize compat run
        if: always()
        env:
          PAGE_URL: https://ewhauser.github.io/gbash/docs/performance/compatibility/
          RAW_SUMMARY_URL: https://ewhauser.github.io/gbash/compat/latest/summary.json
          COMPAT_EXIT_CODE: ${{ steps.run-compat.outputs.exit_code }}
          PUBLISHABLE: ${{ steps.publish-state.outputs.publishable }}
          DEPLOYABLE: ${{ steps.publish-state.outputs.deployable }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          REF_NAME: ${{ github.ref_name }}
          WEBSITE_TAG: ${{ steps.website_tag.outputs.tag }}
          WEBSITE_BUILD_OUTCOME: ${{ steps.website_build.outcome }}
          FALLBACK_BUILD_OUTCOME: ${{ steps.website_build_fallback.outcome }}
          SITE_SOURCE: ${{ steps.publish-state.outputs.site_source }}
        run: |
          {
            echo "## Compatibility"
            echo
            echo "Harness exit code: \`$COMPAT_EXIT_CODE\`"
            echo
            if [ "$SITE_SOURCE" = "current checkout fallback" ]; then
              echo "Website bundle source: current checkout fallback"
              echo
            elif [ -n "$WEBSITE_TAG" ] && [ "$WEBSITE_BUILD_OUTCOME" = "success" ]; then
              echo "Website bundle source: released tag \`$WEBSITE_TAG\`"
              echo
            elif [ -n "$WEBSITE_TAG" ]; then
              echo "Website bundle source: failed to build released tag \`$WEBSITE_TAG\`."
              echo
            else
              echo "Website bundle source: no release tag found."
              echo
            fi
            if [ "$DEPLOYABLE" = "true" ]; then
              echo "Published latest report: $PAGE_URL"
            elif [ "$PUBLISHABLE" = "true" ]; then
              if [ "${WEBSITE_BUILD_OUTCOME:-}" != "success" ] && [ "${FALLBACK_BUILD_OUTCOME:-}" != "success" ]; then
                echo "Compatibility assets were generated, but the website export failed so the previous published page remains in place."
              else
                echo "Report bundle generated, but not deployed because ref \`$REF_NAME\` is not the default branch \`$DEFAULT_BRANCH\`."
              fi
            else
              echo "No new report published. The previous report remains in place at $PAGE_URL"
            fi
            echo
            echo "Raw summary asset: $RAW_SUMMARY_URL"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload raw compat artifacts
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: compat-results-${{ github.run_id }}
          path: .cache/gnu/results/ci-latest
          retention-days: 30

      - name: Upload Pages artifact
        if: always() && steps.publish-state.outputs.deployable == 'true'
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4
        with:
          path: ${{ runner.temp }}/compat-pages

  publish:
    if: always() && needs.compat.outputs.deployable == 'true'
    needs: compat
    runs-on: ubuntu-24.04
    concurrency:
      group: github-pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
