version: "2"

formatters:
  enable:
    - gofmt
    - goimports

linters:
  enable:
    - depguard
    - errcheck
    - forbidigo
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gocritic
    - revive
    - misspell
    - modernize

  settings:
    revive:
      rules:
        - name: exported
          disabled: true

    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance

    misspell:
      locale: US

    depguard:
      rules:
        builtins_host_packages:
          files:
            - internal/builtins/*.go
            - "!internal/builtins/*_test.go"
          deny:
            - pkg: os/exec$
              desc: Use inv.Exec or executeCommand so subprocess policy is enforced.
            - pkg: path/filepath$
              desc: Use gbfs/path helpers and inv.FS so sandbox path policy is enforced.
            - pkg: os/user$
              desc: Use invocation-provided identity instead of host user lookups.
            - pkg: os/signal$
              desc: Do not mutate process-wide signal handlers from commands.
            - pkg: plugin$
              desc: Do not load host plugins from commands.
            - pkg: crypto/tls$
              desc: Use inv.Fetch instead of direct host TLS clients or listeners.
            - pkg: net$
              desc: Use invocation network capabilities instead of direct host networking.
        builtins_net_http:
          files:
            - internal/builtins/*.go
            - "!internal/builtins/*_test.go"
            - "!internal/builtins/curl.go"
            - "!internal/builtins/file.go"
          deny:
            - pkg: net/http
              desc: Use inv.Fetch for network access; keep pure HTTP helpers behind reviewed wrappers.
        builtins_term:
          files:
            - internal/builtins/*.go
            - "!internal/builtins/*_test.go"
            - "!internal/builtins/ls.go"
            - "!internal/builtins/test.go"
          deny:
            - pkg: golang.org/x/term$
              desc: Use reviewed helpers for terminal detection instead of raw file descriptor probes.
        builtins_syscall_imports:
          files:
            - internal/builtins/*.go
            - "!internal/builtins/*_test.go"
            - "!internal/builtins/basenc.go"
            - "!internal/builtins/basenc_formats.go"
            - "!internal/builtins/readlink.go"
            - "!internal/builtins/realpath.go"
            - "!internal/builtins/rmdir.go"
            - "!internal/builtins/tee.go"
            - "!internal/builtins/truncate.go"
            - "!internal/builtins/unlink.go"
            - "!internal/builtins/yes.go"
          deny:
            - pkg: syscall$
              desc: Do not access host syscalls directly from commands.
        builtins_unix_imports:
          files:
            - internal/builtins/*.go
            - "!internal/builtins/*_test.go"
            - "!internal/builtins/cat_appendmode_unix.go"
          deny:
            - pkg: golang.org/x/sys/unix$
              desc: Do not access host kernel APIs directly from commands.

    forbidigo:
      analyze-types: true
      forbid:
        - pattern: '^os\.(Open|OpenFile|Create|ReadFile|WriteFile|Stat|Lstat|ReadDir|Mkdir|MkdirAll|Remove|RemoveAll|Rename|Symlink|Link|Chmod|Chown|Chtimes|Readlink|Getwd|Chdir|DirFS|OpenInRoot|OpenRoot|MkdirTemp|CreateTemp|TempDir)$'
          msg: Use inv.FS or the shared command helpers so sandbox policy is enforced.
        - pattern: '^os\.(Getenv|LookupEnv|Environ|ExpandEnv|Setenv|Unsetenv|Clearenv|UserHomeDir|Hostname|Args|Exit)$'
          msg: Use invocation-provided environment and process state instead of host globals.
        - pattern: '^exec\.(Command|CommandContext)$'
          pkg: '^os/exec$'
          msg: Use inv.Exec or executeCommand so subprocess policy is enforced.
        - pattern: '^os\.StartProcess$'
          msg: Use inv.Exec or executeCommand so subprocess policy is enforced.
        - pattern: '^net\.(Dial|DialContext|DialTimeout|LookupAddr|LookupCNAME|LookupHost|LookupIP|LookupIPAddr|LookupMX|LookupNS|LookupPort|LookupSRV|LookupTXT)$'
          pkg: '^net$'
          msg: Use invocation network capabilities instead of direct host networking.
        - pattern: '^http\.(DefaultClient|DefaultTransport|Client|Transport|Get|Head|Post|PostForm|NewRequest|NewRequestWithContext|ListenAndServe|ListenAndServeTLS|Serve|ServeTLS)$'
          pkg: '^net/http$'
          msg: Use inv.Fetch so network policy is enforced.
        - pattern: '^tls\.(Dial|DialWithDialer|Listen)$'
          pkg: '^crypto/tls$'
          msg: Use inv.Fetch instead of direct host TLS clients or listeners.
        - pattern: '^syscall\.(Kill|Open|Openat|Readlink|Symlink|Link|Rename|Unlink|Unlinkat|Mkdir|Mkdirat|Exec|ForkExec|StartProcess|Mount|PivotRoot|Chdir|Chroot|Fchdir|Connect|Socket|Socketpair|Bind|Listen|Accept|Accept4|Dup|Dup2|Dup3|Syscall|Syscall6|RawSyscall|RawSyscall6)$'
          msg: Do not access host syscalls directly from commands.
        - pattern: '^unix\.(Uname|Umask|Open|Openat|Readlink|Readlinkat|Symlink|Symlinkat|Link|Linkat|Rename|Renameat|Unlink|Unlinkat|Mkdir|Mkdirat|Exec|ForkExec|Mount|PivotRoot|Chdir|Chroot|Fchdir|Connect|Socket|Socketpair|Bind|Listen|Accept|Accept4|Dup|Dup2|Dup3|Ioctl.*|Kill|Setns)$'
          pkg: '^golang\.org/x/sys/unix$'
          msg: Do not read or mutate host process or kernel state directly from commands.
        - pattern: '^commands\.CommandFS\.raw$'
          pkg: '^github\.com/ewhauser/gbash/commands$'
          msg: Do not bypass CommandFS policy checks; use inv.FS methods instead.
        - pattern: '^io\.ReadAll$'
          pkg: '^io$'
          msg: Use commands.ReadAll, commands.ReadAllStdin, or inv.FS.ReadFile so MaxFileBytes is enforced.
        - pattern: '^os\.(FindProcess|Geteuid|Getegid|Getuid|Getgid|Getpid|Getppid)$'
          msg: Use invocation-provided identity or process state instead of host process state.

  exclusions:
    rules:
      - path-except: ^internal/builtins/
        linters:
          - depguard
      - path-except: ^(commands|internal/builtins)/
        linters:
          - forbidigo
      - path: ^internal/builtins/.*_test\.go$
        linters:
          - depguard
      - path: ^(commands|internal/builtins)/.*_test\.go$
        linters:
          - forbidigo
      - path: ^commands/invocation_capabilities\.go$
        text: "use of `fs\\.raw` forbidden because \"Do not bypass CommandFS policy checks; use inv\\.FS methods instead\\.\""
        linters:
          - forbidigo
      - path: ^commands/read\.go$
        text: "use of `io\\.ReadAll` forbidden because \"Use commands\\.ReadAll, commands\\.ReadAllStdin, or inv\\.FS\\.ReadFile so MaxFileBytes is enforced\\.\""
        linters:
          - forbidigo

issues:
  max-issues-per-linter: 50
  max-same-issues: 5
