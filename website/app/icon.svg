<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Terminal screen glow -->
    <radialGradient id="screenGlow" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#141820"/>
      <stop offset="100%" stop-color="#08090a"/>
    </radialGradient>

    <!-- Gopher body gradient -->
    <linearGradient id="gopherFur" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E8A838"/>
      <stop offset="100%" stop-color="#C4852A"/>
    </linearGradient>

    <!-- Subtle noise texture -->
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
      <feBlend in="SourceGraphic" in2="grayNoise" mode="multiply" result="grainy"/>
      <feComponentTransfer in="grainy">
        <feFuncA type="linear" slope="1"/>
      </feComponentTransfer>
    </filter>

    <!-- Terminal bezel shadow -->
    <filter id="bezelShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.5"/>
    </filter>

    <!-- Inner glow for screen -->
    <filter id="innerGlow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="12" result="blur"/>
      <feOffset dx="0" dy="0"/>
      <feComposite in2="SourceAlpha" operator="arithmetic" k2="-1" k3="1"/>
      <feFlood flood-color="#70b8ff" flood-opacity="0.06"/>
      <feComposite operator="in" in2="blur"/>
      <feComposite in2="SourceGraphic"/>
    </filter>

    <!-- Cursor blink animation -->
    <style>
      @keyframes blink {
        0%, 49% { opacity: 1; }
        50%, 100% { opacity: 0; }
      }
      .cursor { animation: blink 1.2s step-end infinite; }
    </style>
  </defs>

  <!-- === TERMINAL BODY === -->
  <!-- Outer bezel -->
  <rect x="32" y="32" width="448" height="448" rx="38" ry="38"
        fill="#1e1f21" filter="url(#bezelShadow)"/>
  <!-- Inner bezel bevel -->
  <rect x="38" y="38" width="436" height="436" rx="34" ry="34"
        fill="#141516"/>
  <!-- Bezel highlight (top edge) -->
  <rect x="38" y="38" width="436" height="6" rx="3" ry="3"
        fill="#fff" opacity="0.06"/>

  <!-- Screen inset -->
  <rect x="52" y="72" width="408" height="388" rx="12" ry="12"
        fill="url(#screenGlow)" filter="url(#innerGlow)"/>

  <!-- Scanline overlay -->
  <g opacity="0.03">
    <line x1="52" y1="76" x2="460" y2="76" stroke="#70b8ff" stroke-width="1"/>
    <line x1="52" y1="80" x2="460" y2="80" stroke="#70b8ff" stroke-width="1"/>
    <line x1="52" y1="84" x2="460" y2="84" stroke="#70b8ff" stroke-width="1"/>
    <line x1="52" y1="88" x2="460" y2="88" stroke="#70b8ff" stroke-width="1"/>
    <line x1="52" y1="92" x2="460" y2="92" stroke="#70b8ff" stroke-width="1"/>
    <line x1="52" y1="96" x2="460" y2="96" stroke="#70b8ff" stroke-width="1"/>
    <line x1="52" y1="100" x2="460" y2="100" stroke="#70b8ff" stroke-width="1"/>
    <line x1="52" y1="104" x2="460" y2="104" stroke="#70b8ff" stroke-width="1"/>
    <line x1="52" y1="108" x2="460" y2="108" stroke="#70b8ff" stroke-width="1"/>
    <line x1="52" y1="112" x2="460" y2="112" stroke="#70b8ff" stroke-width="1"/>
    <line x1="52" y1="116" x2="460" y2="116" stroke="#70b8ff" stroke-width="1"/>
    <line x1="52" y1="120" x2="460" y2="120" stroke="#70b8ff" stroke-width="1"/>
    <line x1="52" y1="124" x2="460" y2="124" stroke="#70b8ff" stroke-width="1"/>
    <line x1="52" y1="128" x2="460" y2="128" stroke="#70b8ff" stroke-width="1"/>
  </g>

  <!-- === TITLE BAR === -->
  <!-- Title bar background -->
  <rect x="32" y="32" width="448" height="44" rx="38" ry="38" fill="#1e1f21"/>
  <rect x="32" y="56" width="448" height="20" fill="#1e1f21"/>
  <!-- Separator line -->
  <line x1="52" y1="75" x2="460" y2="75" stroke="#000" stroke-width="1" opacity="0.5"/>

  <!-- Window buttons -->
  <circle cx="72" cy="54" r="7" fill="#ff5f57"/>
  <circle cx="96" cy="54" r="7" fill="#febc2e"/>
  <circle cx="120" cy="54" r="7" fill="#28c840"/>

  <!-- Title text -->
  <text x="256" y="59" text-anchor="middle"
        font-family="'SF Mono', 'Fira Code', 'Cascadia Code', monospace"
        font-size="13" font-weight="600" fill="rgba(255,255,255,0.45)" letter-spacing="1.5">
    gbash
  </text>

  <!-- === GOPHER CHARACTER === -->
  <g transform="translate(256, 255)">

    <!-- Ears (behind head) -->
    <!-- Left ear -->
    <ellipse cx="-72" cy="-78" rx="28" ry="32" fill="#C4852A"/>
    <ellipse cx="-72" cy="-78" rx="18" ry="22" fill="#F0C078"/>
    <!-- Right ear -->
    <ellipse cx="72" cy="-78" rx="28" ry="32" fill="#C4852A"/>
    <ellipse cx="72" cy="-78" rx="18" ry="22" fill="#F0C078"/>

    <!-- Head / body shape -->
    <ellipse cx="0" cy="-20" rx="95" ry="105" fill="url(#gopherFur)"/>

    <!-- Belly -->
    <ellipse cx="0" cy="20" rx="65" ry="65" fill="#F5DEB3" opacity="0.5"/>

    <!-- === EYES === -->
    <!-- Left eye white -->
    <ellipse cx="-32" cy="-52" rx="26" ry="30" fill="#fff"/>
    <!-- Left eye pupil -->
    <circle cx="-28" cy="-48" r="13" fill="#1a1a1a"/>
    <!-- Left eye highlight -->
    <circle cx="-22" cy="-55" r="5" fill="#fff"/>

    <!-- Right eye white -->
    <ellipse cx="32" cy="-52" rx="26" ry="30" fill="#fff"/>
    <!-- Right eye pupil -->
    <circle cx="36" cy="-48" r="13" fill="#1a1a1a"/>
    <!-- Right eye highlight -->
    <circle cx="42" cy="-55" r="5" fill="#fff"/>

    <!-- Nose -->
    <ellipse cx="0" cy="-25" rx="12" ry="8" fill="#8B5E3C"/>

    <!-- === TEETH === -->
    <!-- Tooth gap background -->
    <rect x="-14" y="-12" width="28" height="28" rx="4" fill="#6B3A2A"/>
    <!-- Left tooth -->
    <rect x="-13" y="-12" width="12" height="24" rx="3" fill="#fff"/>
    <!-- Right tooth -->
    <rect x="1" y="-12" width="12" height="24" rx="3" fill="#fff"/>
    <!-- Tooth line -->
    <line x1="0" y1="-12" x2="0" y2="12" stroke="#e0e0e0" stroke-width="0.5"/>

    <!-- Cheek blush -->
    <ellipse cx="-58" cy="-20" rx="16" ry="10" fill="#E88830" opacity="0.4"/>
    <ellipse cx="58" cy="-20" rx="16" ry="10" fill="#E88830" opacity="0.4"/>

    <!-- === ARMS holding terminal edges === -->
    <!-- Left arm/paw -->
    <g transform="translate(-88, 40)">
      <ellipse cx="-8" cy="0" rx="18" ry="14" fill="#C4852A" transform="rotate(-20)"/>
      <!-- Paw digits -->
      <circle cx="-22" cy="-8" r="6" fill="#D49530"/>
      <circle cx="-26" cy="2" r="5.5" fill="#D49530"/>
      <circle cx="-24" cy="12" r="5" fill="#D49530"/>
    </g>

    <!-- Right arm/paw -->
    <g transform="translate(88, 40)">
      <ellipse cx="8" cy="0" rx="18" ry="14" fill="#C4852A" transform="rotate(20)"/>
      <!-- Paw digits -->
      <circle cx="22" cy="-8" r="6" fill="#D49530"/>
      <circle cx="26" cy="2" r="5.5" fill="#D49530"/>
      <circle cx="24" cy="12" r="5" fill="#D49530"/>
    </g>
  </g>

  <!-- === PROMPT LINE === -->
  <!-- Dollar sign prompt -->
  <text x="82" y="420"
        font-family="'SF Mono', 'Fira Code', 'Cascadia Code', monospace"
        font-size="22" font-weight="700" fill="#70b8ff" opacity="0.9">
    $
  </text>
  <!-- Command text -->
  <text x="104" y="420"
        font-family="'SF Mono', 'Fira Code', 'Cascadia Code', monospace"
        font-size="20" font-weight="400" fill="#70b8ff" opacity="0.7">
    gbash
  </text>

  <!-- Blinking cursor -->
  <rect class="cursor" x="182" y="404" width="11" height="20" rx="1" fill="#70b8ff" opacity="0.9"/>

  <!-- === POWER LED === -->
  <circle cx="450" cy="470" r="3" fill="#70b8ff" opacity="0.6"/>
</svg>
